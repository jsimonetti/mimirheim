<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mimirheim reports</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>mimirheim reports</h1>
    <div id="banner">
      <span id="banner-count"></span>
      <span id="banner-range"></span>
      <span id="banner-saving"></span>
      <span id="banner-selfsuf"></span>
    </div>
  </header>

  <section id="sparkline-section" aria-label="Saving trend">
    <svg id="sparkline" width="100%" height="60"></svg>
  </section>

  <section id="filters">
    <label>From <input type="date" id="filter-from"></label>
    <label>To <input type="date" id="filter-to"></label>
    <label>Strategy
      <select id="filter-strategy">
        <option value="">All</option>
      </select>
    </label>
    <label>
      <input type="checkbox" id="filter-hide-suppressed">
      Hide dispatch-suppressed
    </label>
  </section>

  <table id="reports-table">
    <thead>
      <tr>
        <th data-col="ts" class="sortable">Time</th>
        <th data-col="strategy" class="sortable">Strategy</th>
        <th data-col="horizon_steps" class="sortable">Horizon</th>
        <th data-col="naive_cost_eur" class="sortable">Naive (€)</th>
        <th data-col="effective_cost_eur" class="sortable">Effective (€)</th>
        <th data-col="saving_eur" class="sortable">Saving (€)</th>
        <th data-col="total_import_kwh" class="sortable">Import (kWh)</th>
        <th data-col="total_export_kwh" class="sortable">Export (kWh)</th>
        <th data-col="self_sufficiency_pct" class="sortable">Self-suf. (%)</th>
        <th>Report</th>
      </tr>
    </thead>
    <tbody id="reports-body"></tbody>
  </table>

  <footer id="footer"></footer>

  <script src="inventory.js"></script>
  <script>
(function () {
  'use strict';

  var reports = (typeof window.MIMIRHEIM_REPORTS !== 'undefined') ? window.MIMIRHEIM_REPORTS : [];

  // ---- Localise timestamps ----
  var fmt = new Intl.DateTimeFormat(undefined, {
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', hour12: false
  });
  function localTime(isoStr) {
    try { return fmt.format(new Date(isoStr)); } catch (e) { return isoStr; }
  }

  // ---- Banner ----
  function renderBanner(visible) {
    var count = visible.length;
    if (count === 0) { document.getElementById('banner').textContent = 'No reports.'; return; }
    var newest = visible[0].ts;
    var oldest = visible[visible.length - 1].ts;
    var avgSaving = visible.reduce(function (s, r) { return s + (r.saving_eur || 0); }, 0) / count;
    var avgSelfSuf = visible.reduce(function (s, r) { return s + (r.self_sufficiency_pct || 0); }, 0) / count;
    document.getElementById('banner-count').textContent = count + ' report' + (count !== 1 ? 's' : '');
    document.getElementById('banner-range').textContent = localTime(oldest) + ' – ' + localTime(newest);
    document.getElementById('banner-saving').textContent = 'Avg saving: ' + avgSaving.toFixed(4) + ' €';
    document.getElementById('banner-selfsuf').textContent = 'Avg self-suf: ' + avgSelfSuf.toFixed(1) + '%';
  }

  // ---- Sparkline (pure SVG, no library) ----
  function renderSparkline(visible) {
    var svg = document.getElementById('sparkline');
    while (svg.firstChild) svg.removeChild(svg.firstChild);
    var data = visible.slice(0, 48).reverse();  // oldest-first, max 48
    if (data.length < 2) return;
    var savings = data.map(function (r) { return r.saving_eur || 0; });
    var minV = Math.min.apply(null, savings);
    var maxV = Math.max.apply(null, savings);
    var range = maxV - minV || 1;
    var W = svg.clientWidth || 800;
    var H = 60;
    var pad = 4;
    var stepX = (W - 2 * pad) / (data.length - 1);
    function toX(i) { return pad + i * stepX; }
    function toY(v) { return H - pad - ((v - minV) / range) * (H - 2 * pad); }
    var pts = data.map(function (r, i) {
      return toX(i).toFixed(1) + ',' + toY(r.saving_eur || 0).toFixed(1);
    });
    var polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    polyline.setAttribute('points', pts.join(' '));
    polyline.setAttribute('fill', 'none');
    polyline.setAttribute('stroke', '#2255cc');
    polyline.setAttribute('stroke-width', '1.5');
    svg.appendChild(polyline);
    // Zero line
    if (minV <= 0 && maxV >= 0) {
      var zeroY = toY(0);
      var line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', pad); line.setAttribute('x2', W - pad);
      line.setAttribute('y1', zeroY); line.setAttribute('y2', zeroY);
      line.setAttribute('stroke', '#aaa'); line.setAttribute('stroke-width', '0.5');
      line.setAttribute('stroke-dasharray', '3,3');
      svg.appendChild(line);
    }
  }

  // ---- Strategy filter options ----
  var strategies = {};
  reports.forEach(function (r) { if (r.strategy) strategies[r.strategy] = true; });
  var sel = document.getElementById('filter-strategy');
  Object.keys(strategies).sort().forEach(function (s) {
    var opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  // ---- Sort state ----
  var sortCol = 'ts';
  var sortAsc = false;

  // ---- Table rendering ----
  function colorEffective(v) {
    if (v === null || v === undefined) return '';
    if (v < 0) return 'color:#1a7340;font-weight:bold';
    if (v > 0) return 'color:#b26a00;font-weight:bold';
    return '';
  }

  function renderTable(visible) {
    var tbody = document.getElementById('reports-body');
    tbody.innerHTML = '';
    visible.forEach(function (r) {
      var tr = document.createElement('tr');
      if (r.dispatch_suppressed) tr.className = 'suppressed';
      var eff = r.effective_cost_eur;
      var effStr = (eff !== undefined && eff !== null) ? eff.toFixed(4) : '—';
      tr.innerHTML =
        '<td>' + localTime(r.ts) + '</td>' +
        '<td>' + (r.strategy || '—') + '</td>' +
        '<td>' + (r.horizon_steps ? (r.horizon_steps * 0.25).toFixed(2) + ' h' : '—') + '</td>' +
        '<td>' + (r.naive_cost_eur !== undefined ? r.naive_cost_eur.toFixed(4) : '—') + '</td>' +
        '<td style="' + colorEffective(eff) + '">' + effStr + '</td>' +
        '<td>' + (r.saving_eur !== undefined ? r.saving_eur.toFixed(4) : '—') + '</td>' +
        '<td>' + (r.total_import_kwh !== undefined ? r.total_import_kwh.toFixed(3) : '—') + '</td>' +
        '<td>' + (r.total_export_kwh !== undefined ? r.total_export_kwh.toFixed(3) : '—') + '</td>' +
        '<td>' + (r.self_sufficiency_pct !== undefined ? r.self_sufficiency_pct.toFixed(1) + '%' : '—') + '</td>' +
        '<td><a href="' + r.file + '">open</a></td>';
      tbody.appendChild(tr);
    });
  }

  // ---- Filter + sort ----
  function getVisible() {
    var fromVal = document.getElementById('filter-from').value;
    var toVal = document.getElementById('filter-to').value;
    var stratVal = document.getElementById('filter-strategy').value;
    var hideSuppressed = document.getElementById('filter-hide-suppressed').checked;

    var filtered = reports.filter(function (r) {
      if (fromVal && r.ts < fromVal) return false;
      if (toVal && r.ts > toVal + 'Z') return false;
      if (stratVal && r.strategy !== stratVal) return false;
      if (hideSuppressed && r.dispatch_suppressed) return false;
      return true;
    });

    filtered.sort(function (a, b) {
      var av = a[sortCol], bv = b[sortCol];
      if (av === undefined) av = '';
      if (bv === undefined) bv = '';
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1 : -1;
      return 0;
    });

    return filtered;
  }

  function refresh() {
    var visible = getVisible();
    renderBanner(visible);
    renderSparkline(visible);
    renderTable(visible);
  }

  // ---- Sort headers ----
  document.querySelectorAll('th.sortable').forEach(function (th) {
    th.style.cursor = 'pointer';
    th.addEventListener('click', function () {
      var col = th.dataset.col;
      if (sortCol === col) { sortAsc = !sortAsc; } else { sortCol = col; sortAsc = false; }
      document.querySelectorAll('th.sortable').forEach(function (h) { h.removeAttribute('data-sort'); });
      th.setAttribute('data-sort', sortAsc ? 'asc' : 'desc');
      refresh();
    });
  });

  // ---- Filters ----
  ['filter-from', 'filter-to', 'filter-strategy', 'filter-hide-suppressed'].forEach(function (id) {
    document.getElementById(id).addEventListener('change', refresh);
  });

  // ---- Footer ----
  if (reports.length > 0) {
    document.getElementById('footer').textContent =
      'mimirheim-reporter | last updated ' + localTime(reports[0].ts);
  } else {
    document.getElementById('footer').textContent = 'mimirheim-reporter | no reports yet';
  }

  refresh();
})();
  </script>
</body>
</html>
