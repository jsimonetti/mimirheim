<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mimirheim config editor</title>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>
  <header>
    <div id="header-left">
      <h1>mimirheim</h1>
      <nav id="mode-bar">
        <button class="mode-btn" id="mode-btn-reports" type="button">Reports</button>
        <button class="mode-btn active" id="mode-btn-config" type="button">Config</button>
      </nav>
    </div>
    <div id="save-bar">
      <span id="save-status"></span>
      <button id="save-btn" type="button">Save</button>
    </div>
  </header>

  <nav id="tab-bar">
    <!-- Tab buttons are injected by app.js -->
  </nav>

  <div id="reports-pane">
    <!-- Filled by app.js when switching to reports mode -->
  </div>

  <main id="content-pane">
    <!-- Active tab content is rendered here by app.js -->
    <p id="loading-msg">Loading&hellip;</p>
  </main>

  <script src="static/app.js"></script>
</body>
</html>
