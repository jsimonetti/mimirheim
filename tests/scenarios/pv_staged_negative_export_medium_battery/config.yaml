# Staged PV with negative export price and medium-full battery.
#
# PV is only available at step 0 (forecast 4.0 kW). Battery has 0.70 kWh
# headroom (soc=4.30, capacity=5.0). Stage 2.5 kW is the highest stage that
# does not overflow the battery at step 0; stage 4.5 kW would exceed the
# remaining capacity and is infeasible. The solver therefore selects stage 2.5
# at step 0. Steps 1-3 have no PV; the solver imports cheaply from the grid
# rather than discharging the battery, because the terminal-SoC credit makes
# each kWh of stored energy worth more than the grid import price over this
# short horizon.

mqtt:
  host: localhost
  client_id: sim
outputs:
  schedule: x/s
  current: x/c
  last_solve: x/l
  availability: x/a
grid:
  import_limit_kw: 10.0
  export_limit_kw: 5.0
batteries:
  bat:
    capacity_kwh: 5.0
    charge_segments:
    - power_max_kw: 2.5
      efficiency: 0.95
    discharge_segments:
    - power_max_kw: 2.5
      efficiency: 0.95
    wear_cost_eur_per_kwh: 0.005
    capabilities:
      zero_exchange: true
pv_arrays:
  solar_roof:
    max_power_kw: 4.5
    production_stages:
    - 0.0
    - 0.28
    - 0.37
    - 0.48
    - 0.88
    - 2.5
    - 4.5
static_loads:
  house: {}
