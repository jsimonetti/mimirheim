# Staged PV with negative export price and near-full battery.
# 
# Battery has only 0.05 kWh headroom. Solver pre-discharges slightly at
# t=0 to create room for a single productive PV step later, accepting a
# tiny export penalty that is outweighed by the SoC credit.

mqtt:
  host: localhost
  client_id: sim
outputs:
  schedule: x/s
  current: x/c
  last_solve: x/l
  availability: x/a
grid:
  import_limit_kw: 10.0
  export_limit_kw: 5.0
batteries:
  bat:
    capacity_kwh: 5.0
    charge_segments:
    - power_max_kw: 2.5
      efficiency: 0.95
    discharge_segments:
    - power_max_kw: 2.5
      efficiency: 0.95
    wear_cost_eur_per_kwh: 0.005
    capabilities:
      zero_exchange: true
pv_arrays:
  solar_roof:
    max_power_kw: 4.5
    production_stages:
    - 0.0
    - 0.28
    - 0.37
    - 0.48
    - 0.88
    - 2.5
    - 4.5
static_loads:
  house: {}
