# mimirheim reporter — ApexCharts dashboard example
#
# Requirements:
#   - apexcharts-card custom component (https://github.com/RomRider/apexcharts-card)
#   - mimirheim-reporter configured with chart_publishing.chart_topic and
#     ha_discovery.enabled: true
#   - The sensor entity_id below should match the unique_id generated from
#     your reporter's mqtt.client_id (e.g. client_id "mimirheim-reporter" produces
#     sensor.hioo_reporter_chart_series and sensor.hioo_reporter_summary).
#
# Adjust "hioo_reporter" in every entity ID below to match your client_id.
#
# Example reporter config.yaml excerpt:
#
#   mqtt:
#     host: mosquitto
#     client_id: mimir-reporter
#
#   chart_publishing:
#     chart_topic: mimir/reporter/chart
#     summary_topic: mimir/reporter/summary
#
#   ha_discovery:
#     enabled: true
#     device_name: mimirheim Reporter

# ---------------------------------------------------------------------------
# Card 1 — Battery SOC vs Prices (dual Y-axis, requires apexcharts-card)
#
# Left axis (yaxis_id: soc): battery SOC in kWh, filled area.
# Right axis (yaxis_id: price): import and export prices in ct/kWh, lines.
#
# This chart makes the charging / discharging decisions legible: the battery
# charges (SOC rises) during low-price steps and discharges (SOC falls) when
# prices are high or when self-consumption is optimal.
# ---------------------------------------------------------------------------

type: custom:apexcharts-card
graph_span: 44h
header:
  title: Battery SOC vs Energy Prices
  show: true
span:
  start: hour
  offset: "-12h"
now:
  show: true
  label: ""
yaxis:
  - id: soc
    min: 0
    apex_config:
      title:
        text: SOC (kWh)
  - id: pv
    opposite: true
    show: false
  - id: price
    opposite: true
    apex_config:
      title:
        text: Price (ct/kWh)
series:
  - entity: sensor.marstek_battery_remaining_capacity
    name: SOC measured (kWh)
    color: "#0066cc"
    type: line
    extend_to: false
    fill_raw: last
    yaxis_id: soc
    stroke_width: 2
    show:
      legend_value: false
  - entity: sensor.mimirheim_import_price
    name: Import measured (ct/kWh)
    color: "#ff6600"
    type: line
    extend_to: false
    yaxis_id: price
    stroke_width: 2
    transform: return x * 100;
    show:
      legend_value: false
  - entity: sensor.mimirheim_export_price
    name: Export measured (ct/kWh)
    color: "#009900"
    type: line
    extend_to: false
    yaxis_id: price
    stroke_width: 2
    transform: return x * 100;
    show:
      legend_value: false
  - entity: sensor.zonnepanelen_dak_power
    name: PV measured (kW)
    color: "#ffcc00"
    type: area
    opacity: 0.2
    extend_to: false
    yaxis_id: pv
    stroke_width: 0
    show:
      legend_value: false
  - entity: sensor.mimir_reporter_mimirheim_chart_series
    name: SOC (kWh)
    color: "#0066cc"
    type: area
    opacity: 0.25
    extend_to: false
    yaxis_id: soc
    stroke_width: 2
    show:
      legend_value: false
    data_generator: |
      const key = 'battery__Marstek__soc_kwh';
      return entity.attributes[key]
        ? entity.attributes[key].map(([ts, v]) => [new Date(ts).getTime(), +v.toFixed(2)])
        : [];
  - entity: sensor.mimirheim_prices
    name: Import (ct/kWh)
    color: "#ff6600"
    type: line
    extend_to: false
    yaxis_id: price
    stroke_width: 2
    show:
      legend_value: false
    data_generator: |
      const schedule = entity.attributes.schedule;
      return schedule
        ? schedule.map(s => [new Date(s.ts).getTime(), +(s.import_eur_per_kwh * 100).toFixed(1)])
        : [];
  - entity: sensor.mimirheim_prices
    name: Export (ct/kWh)
    color: "#009900"
    type: line
    extend_to: false
    yaxis_id: price
    stroke_width: 2
    show:
      legend_value: false
    data_generator: |
      const schedule = entity.attributes.schedule;
      return schedule
        ? schedule.map(s => [new Date(s.ts).getTime(), +(s.export_eur_per_kwh * 100).toFixed(1)])
        : [];
  - entity: sensor.mimir_reporter_mimirheim_chart_series
    name: PV forecast (kW)
    color: "#ffcc00"
    type: column
    opacity: 0.2
    stroke_width: 0
    yaxis_id: pv
    show:
      legend_value: false
    data_generator: |
      return entity.attributes.pv_kw
        ? entity.attributes.pv_kw.map(([ts, v]) => [new Date(ts).getTime(), +v.toFixed(2)])
        : [];

---

# ---------------------------------------------------------------------------
# Card 2 — Economic summary (standard Markdown card, no custom component needed)
# ---------------------------------------------------------------------------

type: markdown
title: Solve Summary
content: >
  **Strategy:** {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'strategy') }}

  **Status:** {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'solve_status') }}


  Current import: {{ state_attr('sensor.mimir_reporter_mimirheim_chart_series',
  'import_price')[0][1]|round(3) }} EUR

  Current export: {{ state_attr('sensor.mimir_reporter_mimirheim_chart_series',
  'export_price')[0][1]|round(3) }} EUR


  Naive cost: {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'naive_cost_eur') | round(4) }} EUR

  Effective cost: {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'effective_cost_eur') | round(4) }} EUR 

  Saving: {{ state_attr('sensor.mimir_reporter_mimirheim_summary', 'saving_eur')
  | round(4) }} EUR ({{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'saving_pct') }}%)

  Self-sufficiency: {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'self_sufficiency_pct') }}%

  Grid import: {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'grid_import_kwh') | round(3) }} kWh

  Grid export: {{ state_attr('sensor.mimir_reporter_mimirheim_summary',
  'grid_export_kwh') | round(3) }} kWh

---

