---

# ---------------------------------------------------------------------------
# Card 4 — Grid Import: Predicted vs Actual
# ---------------------------------------------------------------------------

type: custom:apexcharts-card
header:
  title: Grid Import - Predicted vs Actual (24h)
  show: true
graph_span: 24h
span:
  start: day
yaxis:
  - id: power
    min: 0
    apex_config:
      title:
        text: Power (kW)
series:
  # Predicted grid import (from mimirheim schedule sensor)
  - entity: sensor.mimirheim_predicted_grid_import
    name: Predicted
    color: '#0066cc'
    stroke_width: 2
    type: line
    extend_to: false
    
  # Actual grid import (from your meter/inverter)
  - entity: sensor.grid_power_import
    name: Actual
    color: '#cc0000'
    stroke_width: 2
    type: line
    extend_to: false
    
  # Prediction error magnitude (shaded area)
  - entity: sensor.grid_import_prediction_error
    name: Error (absolute)
    color: '#ff9900'
    opacity: 0.3
    type: area
    extend_to: false
    yaxis_id: power
    transform: "return Math.abs(x);"

---

# ---------------------------------------------------------------------------
# Card 5 — Battery SOC: Predicted vs Actual
# ---------------------------------------------------------------------------

type: custom:apexcharts-card
header:
  title: Battery SOC - Predicted vs Actual (24h)
  show: true
graph_span: 24h
span:
  start: day
yaxis:
  - id: soc
    min: 0
    apex_config:
      title:
        text: SOC (kWh)
series:
  # Predicted SOC trajectory (from mimirheim)
  - entity: sensor.mimirheim_predicted_battery_soc
    name: Predicted SOC
    color: '#0066cc'
    stroke_width: 2
    type: line
    extend_to: false
    
  # Actual SOC (from battery BMS)
  - entity: sensor.battery_state_of_charge
    name: Actual SOC
    color: '#00aa00'
    stroke_width: 2
    type: line
    extend_to: false
    
  # SOC prediction error
  - entity: sensor.battery_soc_prediction_error
    name: Error
    color: '#ff9900'
    opacity: 0.3
    type: area
    extend_to: false
    yaxis_id: soc
    transform: "return Math.abs(x);"

---

# ---------------------------------------------------------------------------
# Card 6 — PV Generation: Predicted vs Actual
# ---------------------------------------------------------------------------

type: custom:apexcharts-card
header:
  title: PV Generation - Forecast vs Actual (24h)
  show: true
graph_span: 24h
span:
  start: day
yaxis:
  - id: power
    min: 0
    apex_config:
      title:
        text: Power (kW)
series:
  # PV forecast (from mimirheim)
  - entity: sensor.mimirheim_predicted_pv
    name: Forecast
    color: '#ffcc00'
    stroke_width: 2
    type: line
    extend_to: false
    
  # Actual PV generation (from inverter)
  - entity: sensor.solar_power
    name: Actual
    color: '#ff6600'
    stroke_width: 2
    type: line
    extend_to: false
    
  # Forecast error
  - entity: sensor.pv_prediction_error
    name: Error
    color: '#cc0000'
    opacity: 0.3
    type: area
    extend_to: false
    yaxis_id: power
    transform: "return Math.abs(x);"

---

# ---------------------------------------------------------------------------
# Card 7 — Current Prediction Accuracy Statistics
# ---------------------------------------------------------------------------

type: entities
title: Prediction Accuracy (Current)
entities:
  - entity: sensor.grid_import_prediction_error
    name: Grid Import Error
    icon: mdi:transmission-tower
    secondary_info: last-changed
    
  - type: attribute
    entity: sensor.grid_import_prediction_error
    attribute: percentage_error
    name: Grid Error %
    suffix: "%"
    
  - entity: sensor.battery_soc_prediction_error
    name: Battery SOC Error
    icon: mdi:battery
    
  - type: attribute
    entity: sensor.battery_soc_prediction_error
    attribute: absolute_error
    name: SOC Error (absolute)
    suffix: " kWh"
    
  - entity: sensor.pv_prediction_error
    name: PV Generation Error
    icon: mdi:solar-power
    
  - type: attribute
    entity: sensor.pv_prediction_error
    attribute: absolute_error
    name: PV Error (absolute)
    suffix: " kW"

---

# ---------------------------------------------------------------------------
# Card 8 — Prediction Accuracy Trend (7 days)
# ---------------------------------------------------------------------------

type: custom:apexcharts-card
header:
  title: Prediction Accuracy Trend (7 days, hourly mean)
  show: true
graph_span: 7d
yaxis:
  - id: error
    min: 0
    apex_config:
      title:
        text: Mean Absolute Error
series:
  - entity: sensor.grid_import_prediction_error
    name: Grid Import MAE (kW)
    color: '#cc0000'
    type: line
    stroke_width: 2
    transform: "return Math.abs(x);"
    statistics:
      type: mean
      period: hour
      align: start
      
  - entity: sensor.battery_soc_prediction_error
    name: Battery SOC MAE (kWh)
    color: '#0066cc'
    type: line
    stroke_width: 2
    transform: "return Math.abs(x);"
    statistics:
      type: mean
      period: hour
      align: start
      
  - entity: sensor.pv_prediction_error
    name: PV MAE (kW)
    color: '#ffcc00'
    type: line
    stroke_width: 2
    transform: "return Math.abs(x);"
    statistics:
      type: mean
      period: hour
      align: start
