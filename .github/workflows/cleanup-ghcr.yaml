name: GHCR Cleanup

on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:


jobs:
  ghcr-cleanup-image:
    name: ghcr cleanup actions
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1.0.16
        with:
          keep-n-tagged: 20
          exclude-tags: dev,stable,buildcache,pr-*
          keep-n-untagged: 20
          delete-partial-images: true
          delete-ghost-images: true
          delete-orphaned-images: true