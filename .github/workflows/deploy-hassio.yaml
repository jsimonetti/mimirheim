name: Deploy HA add-on repository

# Pushes the contents of hassio-repository/ to the root of the
# jsimonetti/hassio-apps repository. The add-on builder workflow inside
# that repository then detects changed files and triggers image builds.
#
# Runs on every push to main that touches hassio-repository/, and on every
# version tag so the stable channel receives the new release.

on:
  push:
    branches:
      - main
    paths:
      - "hassio-repository/**"

permissions:
  contents: read

jobs:
  deploy:
    name: Push hassio-repository/ to jsimonetti/hassio-apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Deploy subdirectory to hassio-addons
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          deploy_key: ${{ secrets.HASSIO_APPS_DEPLOY_KEY }}
          external_repository: jsimonetti/hassio-apps
          publish_branch: main
          publish_dir: ./hassio-repository
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
