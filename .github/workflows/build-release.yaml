name: Create release image and push to GHCR

on:
  release:
    types: [published]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILD_NAME: Mimirheim
  BUILD_DESCRIPTION: MILP energy optimiser for home battery, PV, and EV scheduling against dynamic electricity prices.
  BUILD_ARCH: amd64, aarch64
  BUILD_VERSION: ${{ github.ref_name }}
  BUILD_DATE: ${{ github.event.head_commit.timestamp }}
  BUILD_REF: ${{ github.sha }}
  
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest --tb=short -q

  build-and-push-image:
    name: Create release image and push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.COMMIT_PAT_ACTION }}
          ref: ${{ github.ref_name }}

      - name: Setup Buildkit
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: GHCR Login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=stable
            type=ref,event=tag
          labels: |
            io.hass.name="${{ env.BUILD_NAME }}" \
            io.hass.description="${{ env.BUILD_DESCRIPTION }}" \
            io.hass.arch="${{ env.BUILD_ARCH }}" \
            io.hass.type="addon" \
            io.hass.version="${{ env.BUILD_VERSION }}" \
            org.opencontainers.image.title="${{ env.BUILD_NAME }}" \
            org.opencontainers.image.description="${{ env.BUILD_DESCRIPTION }}" \
            org.opencontainers.image.created="${{ env.BUILD_DATE }}" \
            org.opencontainers.image.revision="${{ env.BUILD_REF }}" \
            org.opencontainers.image.source="https://github.com/jsimonetti/mimirheim" \
            org.opencontainers.image.version="${{ env.BUILD_VERSION }}"

      - name: Build and Push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          push: true
          platforms: linux/arm64,linux/amd64
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          context: .
          file: container/Dockerfile

      - name: Update stable add-on version
        run: |
          sed -i "s/^version:.*/version: ${GITHUB_REF_NAME}/" hassio-repository/mimirheim/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hassio-repository/mimirheim/config.yaml
          git diff --cached --quiet || git commit -m "chore: bump stable version to ${GITHUB_REF_NAME}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
